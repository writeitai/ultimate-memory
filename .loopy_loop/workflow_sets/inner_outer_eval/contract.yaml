schema_version: 1
session_protocol_version: 3
layer_kind: delivery
roles:
  outer:
    responsibility: Own the layer plan, accept or return leaf work, maintain the semantic handoff, and decide completion.
  inner:
    responsibility: Dynamically delegate, implement, and verify one outer-selected leaf without owning the layer plan.
  eval_reviewer:
    responsibility: Optionally author or revise outcome-focused harness-judge checks as advisory evidence.
  eval_runner:
    responsibility: Optionally run declared checks and publish provenance-rich advisory observations.
state:
  - path: project_state/plan.md
    owner_role: outer
    contributor_roles: []
  - path: project_state/tasks/
    owner_role: outer
    contributor_roles: [inner]
  - path: project_state/current_state.md
    owner_role: outer
    contributor_roles: []
  - path: project_state/decisions/
    owner_role: outer
    contributor_roles: []
  - path: project_state/finished.md
    owner_role: outer
    contributor_roles: []
  - path: project_state/eval_state.md
    owner_role: outer
    contributor_roles: [eval_reviewer, eval_runner]
  - path: project_state/handoff.json
    owner_role: outer
    contributor_roles: []
  - path: eval_checks/
    owner_role: eval_reviewer
    contributor_roles: [outer]
  - path: eval_receipts/
    owner_role: eval_runner
    contributor_roles: [outer]
orchestration:
  completion_role: outer
  plan_owner: outer
  handoff_owner: outer
  task_acceptance_owner: outer
evaluation:
  advisory: true
  check_author_roles: [eval_reviewer, outer]
  check_runner_roles: [eval_runner, outer]
terminal_blocker_reporting_roles: [outer, inner, eval_reviewer, eval_runner]
child_interface: none
