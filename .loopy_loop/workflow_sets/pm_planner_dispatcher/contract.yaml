schema_version: 1
session_protocol_version: 3
layer_kind: program
roles:
  planner:
    responsibility: Own the high-level program plan, accept or reroute child outcomes, maintain the semantic handoff, and decide completion.
  dispatcher:
    responsibility: Faithfully publish one typed child assignment for the planner-selected milestone outcome and track factual child lifecycle evidence.
state:
  - path: project_state/plan.md
    owner_role: planner
    contributor_roles: []
  - path: project_state/tasks/
    owner_role: planner
    contributor_roles: [dispatcher]
  - path: project_state/current_state.md
    owner_role: planner
    contributor_roles: []
  - path: project_state/dispatch_inputs/
    owner_role: dispatcher
    contributor_roles: []
  - path: project_state/decisions/
    owner_role: planner
    contributor_roles: []
  - path: project_state/finished.md
    owner_role: planner
    contributor_roles: []
  - path: project_state/eval_state.md
    owner_role: planner
    contributor_roles: []
  - path: project_state/handoff.json
    owner_role: planner
    contributor_roles: []
  - path: child_requests/pending/
    owner_role: dispatcher
    contributor_roles: []
  - path: parent_acceptance/
    owner_role: planner
    contributor_roles: []
orchestration:
  completion_role: planner
  plan_owner: planner
  handoff_owner: planner
  child_acceptance_owner: planner
evaluation:
  advisory: true
  check_author_roles: [planner]
  check_runner_roles: [planner]
terminal_blocker_reporting_roles: [planner, dispatcher]
child_interface: recursive
