schema_version: 1
id: code_architecture_enforced_d62
type: harness_judge
description: The hexagonal architecture is mechanically enforced — pure infra-free core, SQL only in spine/, vendor SDKs only in adapters/, import-linter contracts failing CI, explicit composition roots.
tags: [code, D62]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read decisions.md D62 (the enforced code architecture) and plan/designs/packaging_distribution_design.md (the enforced layout), then inspect the package layout and
  the import-linter configuration under the repo. These are acceptance checks for the FINAL
  system: if the subsystem is absent or partial, score 0.

  Verify ALL of the following:
  1. The layout follows the bound shape: model/core/spine/ports/adapters/llm/workers/surfaces/
     eval/profiles (names may evolve slightly, but the layering must match: pure domain core;
     SQL confined to the spine layer; vendor SDKs confined to adapters).
  2. core is pure and infra-free — no SQL, no vendor SDK imports, no I/O clients.
  3. import-linter (or equivalent) contracts encode the allowed arrows and FAIL CI on illegal
     imports — architecture erosion is loud, not gradual.
  4. Profiles are explicit composition roots wiring ports to adapters — no DI framework.

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
