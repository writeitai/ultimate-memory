schema_version: 1
id: registry_scale_partitioning_d23
type: harness_judge
description: The registry scale rules hold — big append-only tables partitioned, hot tables btree-only, blocking indexes on aliases, no HNSW in OLTP Postgres.
tags: [registries, D23, D17]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read plan/designs/postgres_schema_design.md — the binding source — and decisions.md D23 for rationale and
  refinement history, then inspect the
  migrations under src/. These are acceptance checks for the FINAL system: if the subsystem is
  absent or partial, score 0.

  Verify ALL of the following:
  1. The large append-only tables (mentions, resolution_decisions, relation_evidence — per the
     current schema design) are partitioned (range by ingest period or the schema's chosen
     scheme), and the hot append-only tables avoid write-amplifying index types (btree-only
     there).
  2. entities and aliases (the blocking targets) are NOT partitioned.
  3. Alias blocking indexes exist: GIN gin_trgm_ops and a Daitch-Mokotoff expression index on
     the normalized name; relations carry the btree composite on
     (subject_entity_id, predicate[, object]).
  4. Embedding similarity (T3) runs in Lance — no pgvector/HNSW index in OLTP Postgres.

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
