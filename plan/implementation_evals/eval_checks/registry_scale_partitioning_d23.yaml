schema_version: 1
id: registry_scale_partitioning_d23
type: harness_judge
description: The physical scale design holds — the partitioned table estate matches the binding DDL, hot tables stay btree-only, blocking indexes exist, no HNSW in OLTP Postgres, and the ungated-volume load test is provided for.
tags: [registries, D23, D17, D25]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read plan/designs/postgres_schema_design.md (the partitioned DDL across §§7–9.A and §12,
  and §0/§4) and plan/designs/registries_design.md §9/§11 — the binding sources — and
  decisions.md D23 for rationale and refinement history, then inspect the migrations under
  src/. These are acceptance checks for the FINAL system: if the subsystem is absent or
  partial, score 0.

  Verify ALL of the following:
  1. The partitioned estate matches the binding schema — including (not limited to) mentions,
     resolution_decisions, relation_evidence, claims, claim_extraction_decisions, chunks,
     chunk_claims, testimony_currency_events, and observation_evidence, each partitioned as
     the DDL specifies (RANGE by time or HASH by id) — and the hot append-only tables avoid
     write-amplifying index types (btree-only there).
  2. entities and aliases (the blocking targets) are NOT partitioned.
  3. Alias blocking indexes exist: GIN gin_trgm_ops and a Daitch-Mokotoff expression index on
     the normalized name (D17); relations carry the btree composite on
     (subject_entity_id, predicate[, object]).
  4. Embedding similarity (T3) runs in Lance — no pgvector/HNSW index in OLTP Postgres.
  5. A representative load-test hook exists targeting UNGATED full-extraction volume (D25
     re-stamp; registries_design §9/§11) so partition/index choices are validated before
     being locked.

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
