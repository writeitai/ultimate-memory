schema_version: 1
id: e0_content_addressed_reuse
type: harness_judge
description: Re-ingesting an edited document costs proportional to the edit — reuse keys contain no LLM output, and targeted tests prove the reuse behavior.
tags: [e0, e2, D56]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read decisions.md D56 and plan/designs/evidence_lifecycle_design.md ("Content-addressed
  reuse"), then inspect the E2 idempotency keys, the version-diff logic, and the tests under
  src/. These are acceptance checks for the FINAL system: if the subsystem is absent or
  partial, score 0.

  Verify ALL of the following:
  1. E2 extraction idempotency keys on an extraction_input_hash built from stable components
     only: the chunk's own block hashes + neighbor-chunk block hashes + stable header facts +
     extractor version + structurer version. NO LLM output (section path text, summaries, E1
     prefix) participates in the key — LLM-derived context is carried forward for unchanged
     regions instead.
  2. The chunk_claims map records claim occurrences on both fresh extraction and reuse (one
     immutable claim attached to every version-chunk that carried it; exact, never inferred
     from content-hash joins).
  3. Embeddings key on (chunk content hash, embedding version); conversion artifacts on
     (content object, converter version); reuse alignment is a block-hash sequence diff with
     anchor-stabilized chunk boundaries.
  4. Targeted TESTS exist and pass, demonstrating: an unchanged re-ingest is a no-op; a
     one-block edit reuses the unchanged chunks' claims and re-extracts only affected chunks;
     a neighbor-chunk change forces re-extraction of the dependent chunk; and no LLM-derived
     field appears in the reuse key.

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
