schema_version: 1
id: ret_envelope_negative_taxonomy
type: harness_judge
description: A typed negative taxonomy — unknown_entity / known_empty / boundary; no denied kind; hard-forgotten content is indistinguishable from never-existed.
tags: [retrieval, D49, D50, D43]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read plan/designs/retrieval_design.md — the binding source — and decisions.md D49 (typed negatives) and D50 (trust model) for rationale and
  refinement history, then inspect the negative
  result types under src/. These are acceptance checks for the FINAL system: if the subsystem
  is absent or partial, score 0.

  Verify ALL of the following:
  1. Empty/failed lookups return a typed negative: unknown_entity (nothing resolves),
     known_empty (resolved, genuinely nothing there), or boundary (a named limitation with a
     workaround, e.g. the D43 cross-entity numeric-scan boundary).
  2. There is NO denied kind (content-level authorization is out of library scope).
  3. Hard-forgotten content answers exactly like never-existed content — same negative kind,
     same shape, no distinguishing metadata; a contract test (or CI gate wired to the deletion
     cascade) demonstrates the indistinguishability.

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
