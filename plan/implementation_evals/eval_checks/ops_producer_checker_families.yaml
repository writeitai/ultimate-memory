schema_version: 1
id: ops_producer_checker_families
type: harness_judge
description: Every checking seat runs on a different model family than the producer it checks, auditable via recorded model assignments.
tags: [ops, D53]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read decisions.md D53, then inspect the model assignment configuration under src/. These are
  acceptance checks for the FINAL system: if the subsystem is absent or partial, score 0.

  Verify ALL of the following:
  1. Checking seats (the sampled grounding judge, contradiction/citation-faithfulness evals,
     the review agent, the K reflection pass) are configured on a different model FAMILY than
     the producer they check.
  2. Model assignments are recorded (pipeline_component_versions naming producer and checker
     models) so the separation is auditable.
  3. Running a checker in the producer's family requires a recorded exception — it cannot
     happen as a quiet config default.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
