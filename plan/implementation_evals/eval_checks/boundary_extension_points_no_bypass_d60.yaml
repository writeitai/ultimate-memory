schema_version: 1
id: boundary_extension_points_no_bypass_d60
type: harness_judge
description: Extension points cannot bypass invariants — ingestion always writes through E0; review always appends reversible verdicts; no consumer hook reaches around the pipeline.
tags: [boundary, D60, D62]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read decisions.md D60 (constraint 2) and D62 (client surface) and plan/designs/packaging_distribution_design.md (the client surface), then inspect every extension
  point (connector interface, ingest API, review sink, provider ports) under src/. These are
  acceptance checks for the FINAL system: if the subsystem is absent or partial, score 0.

  Verify ALL of the following:
  1. Every ingestion path — connectors, the client push API, bulk import — writes through E0
     (lineage identity, origin stamp, content hashing); no API allows inserting claims,
     relations, observations, or K pages directly.
  2. Review integrations can only append reversible, provenance-stamped verdicts (the D24
     shape) — no hook allows destructive merges or direct registry rewrites.
  3. Provider-port adapters (D61) receive substrate operations only — no port interface
     exposes a way to mutate spine semantics (validity, adjudication outcomes, citations).

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
