schema_version: 1
id: p_projections_hold_no_authority
type: harness_judge
description: Validity state has exactly one home (Postgres); projection builders are dumb, deterministic, and decision-free — the architectural outcome, however the modules are split.
tags: [p, D6, D62]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read plan/designs/overall_design.md §2 and plan/designs/p2_graph_design.md §1 — the binding
  sources — and decisions.md D6 (and D62's enforced package architecture) for rationale and
  refinement history, then inspect the projection builders under src/. These are acceptance
  checks for the FINAL system: if the subsystem is absent or partial, score 0.

  Verify ALL of the following:
  1. No code path mutates validity/invalidation/contradiction state in a projection store —
     Lance/Ladybug/P3 receive filtered copies from Postgres and are never the site of a
     decision. Judge the OUTCOME (no adjudication, no supersession logic, no LLM calls inside
     projection builders), whatever the internal module split; the D62 package-level import
     contracts (CI-enforced) are supporting evidence, not a prescribed submodule graph.
  2. Every projection is deletable and rebuildable from Postgres (+ artifacts) by a tested
     batch path; nothing in a projection is source-of-truth.
  3. The projection writers are deterministic (same inputs, same snapshot — modulo declared
     versioning).

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
