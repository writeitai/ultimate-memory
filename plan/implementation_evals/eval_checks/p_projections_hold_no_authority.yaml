schema_version: 1
id: p_projections_hold_no_authority
type: harness_judge
description: Validity state has exactly one home (Postgres); projection builders are architecturally barred from decision-making — enforced import boundaries, dumb deterministic writers.
tags: [p, D6, D62]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read decisions.md D6 (and D62's enforced architecture), then inspect the projection builders
  and the import-linter contracts under src/. These are acceptance checks for the FINAL
  system: if the subsystem is absent or partial, score 0.

  Verify ALL of the following:
  1. Projection builders (P1/P2/P3 writers) import only read-side repositories and projection
     writers — the architecture contracts (D62 import-linter) bar them from importing
     adjudicators, LLM clients, or any repository that mutates validity/contradiction state;
     CI fails on illegal imports.
  2. No code path mutates validity/invalidation/contradiction state in a projection store —
     Lance/Ladybug/P3 receive filtered copies from Postgres and are never the site of a
     decision.
  3. Every projection is deletable and rebuildable from Postgres (+ artifacts) by a tested
     batch path; nothing in a projection is source-of-truth.
  4. The graph writer is deterministic — no adjudication, no supersession logic, no LLM calls
     inside projection builders.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
