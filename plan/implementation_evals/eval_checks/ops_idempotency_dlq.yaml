schema_version: 1
id: ops_idempotency_dlq
type: harness_judge
description: Every worker is idempotent on the key fitting its grain; work is processing_state rows (the sole authority) with a bounded per-stage retry policy, dead-letter, and a janitor sweep.
tags: [ops, D12, D56, D62, D45]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read plan/designs/orchestration_design.md and plan/designs/postgres_schema_design.md §2 —
  the binding sources — and decisions.md D12, D56, and D62 (task execution) for rationale
  and refinement history, then inspect the workers and queue handling under src/. These are
  acceptance checks for the FINAL system: if the subsystem is absent or partial, score 0.

  Verify ALL of the following:
  1. Every worker is re-runnable and idempotent on the key fitting its grain: per-document/
     chunk workers on a content-derived hash + their own processing version (D12/D56);
     aggregate workers (K compiles, projection rebuilds) on recorded input/snapshot hashes
     (e.g. inputs_hash, D45). Re-delivery or re-run of an unchanged input is a no-op.
  2. Work items are processing_state rows in Postgres — the SOLE authority (D62); queue
     deliveries are delivery-only signals; handlers are registered per stage and
     shell-agnostic; a janitor sweep re-announces lost deliveries.
  3. Retries follow a bounded, persisted PER-STAGE retry policy (the schema binds
     max_attempts with a shipped default of 2 as a tunable starting point — a deliberately
     configured different bound is conformant); exhausted work dead-letters into Postgres
     with recorded status and enough context to inspect and replay — failures never vanish.
  4. The per-document E chain is task-driven; aggregate layers (K, P) are debounced or
     scheduled, never triggered per document.

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
