schema_version: 1
id: e0_origin_stamped_at_ingest
type: harness_judge
description: Every input carries an immutable origin stamp (external vs self/system-generated) set at ingest.
tags: [e0, D42]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read decisions.md D42 and plan/designs/postgres_schema_design.md (documents), then inspect the ingest worker and documents schema under src/. These
  are acceptance checks for the FINAL system: if the subsystem is absent or partial, score 0.

  Verify ALL of the following:
  1. Every ingested document records an origin field distinguishing at minimum external from
     self/system-generated, set at E0 ingest time.
  2. The field is immutable after ingest — no code path updates it.
  3. The origin is stored on the durable document lineage/input metadata and remains reachable
     from all versions and downstream provenance (so confidence math can later discount
     self-generated echoes) — duplication onto every version row is not required.

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
