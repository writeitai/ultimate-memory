id: e0_origin_stamped_at_ingest
type: harness_judge
description: Every input carries an immutable origin stamp (external vs self/system-generated) set at ingest.
tags: [e0, D42]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read decisions.md D42, then inspect the ingest worker and documents schema under src/. These
  are acceptance checks for the FINAL system: if the subsystem is absent or partial, score 0.

  Verify ALL of the following:
  1. Every ingested document records an origin field distinguishing at minimum external from
     self/system-generated, set at E0 ingest time.
  2. The field is immutable after ingest — no code path updates it.
  3. Nothing downstream silently drops it (it survives on the lineage/version rows so
     confidence math can later discount self-generated echoes).

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
