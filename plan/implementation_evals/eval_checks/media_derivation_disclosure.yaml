schema_version: 1
id: media_derivation_disclosure
type: harness_judge
description: Derivation disclosure is deterministic and block-inherited — sections carry derivation_kind + evidence_mode from the converter manifest, claims inherit through their span→block→section mapping, the envelope surfaces both, and the mode is disclosure never a verdict.
tags: [e2, ret, media, D65, D49]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read plan/designs/media_design.md §5 and plan/designs/retrieval_design.md §5 — the binding
  sources — and decisions.md D65 (with the D49 refinement annotation) for rationale, then
  locate the disclosure propagation and envelope code under src/. These are acceptance checks
  for the FINAL system: if the subsystem is absent or partial, score 0.

  Verify ALL of the following:
  1. The evidence_mode trichotomy exists as a typed enum with exactly the three values —
     source_expression (a fallible rendering of speech/symbols present in the source: a
     transcript sentence, OCR'd text), model_observation (the model's account of what the
     source shows), model_interpretation (the model's reading into the source) — alongside a
     derivation_kind (asr | acoustic_events | vlm_description | ocr | shot_notes |
     passthrough | …).
  2. Both labels originate ONLY from the converter's manifest, which labels contiguous
     MODE-HOMOGENEOUS character ranges of document.md: converter routes emit the model's
     interpretations in ranges labeled separately from its observations (an output contract
     obligation on the route), and no LLM call, heuristic, or per-claim judgment assigns
     labels anywhere downstream. Text from non-media routes carries passthrough/
     source_expression labels by the same mechanism — the labeling is total, not a media-only
     special case.
  3. Claims inherit the labels deterministically through their source_span → labeled-range
     intersection, with the bound tie-break: a span crossing ranges with different modes
     takes the MOST-mediated mode it touches (model_interpretation > model_observation >
     source_expression). The resolved labels are cached on the claim's occurrence record
     (chunk_claims.derivation_kind/evidence_mode, per schema §7) — queryable without
     re-walking the mapping. Verify against a fixture whose source mixes observation and
     interpretation content: the separation must be demonstrably deterministic, not asserted.
  4. The retrieval envelope surfaces derivation {kind, evidence_mode} PER EVIDENCE ITEM
     (never one flattened label on a fact-grain result — a fact aggregates claims with
     possibly different modes), so a reader of "Alice looked hesitant" sees it is a model
     interpretation from a VLM before weighing it.
  5. The mode is disclosure, never a verdict, and the correlation policy is exactly as bound:
     no code path uses evidence_mode to auto-drop, down-rank, or invalidate claims
     (Selection's verifiability rules remain the only keep/drop line); evidence_count counts
     distinct source lineages — never derivation runs; distinct-lineage counts are the ONLY
     confidence input (no correlation-aware adjustment exists — it is a documented
     alternative); and derivation-family provenance is surfaced as disclosure so callers can
     see same-family corroboration (D42).

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
