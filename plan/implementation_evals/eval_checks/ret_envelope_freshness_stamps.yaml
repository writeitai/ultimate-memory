schema_version: 1
id: ret_envelope_freshness_stamps
type: harness_judge
description: Per-source freshness stamps ship in every envelope — PG live, P1 write lag, P2 snapshot age with believed_at horizon + typed boundary fallback, K compiled_at + staleness + flag count.
tags: [retrieval, D49, D48]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read decisions.md D49 (freshness stamps) and D48, then inspect the envelope freshness
  section under src/. These are acceptance checks for the FINAL system: if the subsystem is
  absent or partial, score 0.

  Verify ALL of the following:
  1. Envelopes stamp each contributing source: Postgres (live), P1 (write lag), P2 (snapshot
     timestamp), K (compiled_at + staleness state + open-flag count).
  2. Each channel's believed_at horizon is carried; a transaction-time query outside the hot
     snapshot's retention window returns a typed boundary naming the fallback (PG traversal or
     an archived snapshot) rather than a silent wrong answer.
  3. The applied temporal parameters (valid_at / believed_at) and the identity regime (current
     aliases vs identity_as_of) are echoed in composition-ready form.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
