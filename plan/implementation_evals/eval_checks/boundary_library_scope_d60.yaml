schema_version: 1
id: boundary_library_scope_d60
type: harness_judge
description: The library boundary holds — no web UI, no multi-tenant control plane, no SSO/billing; agent surfaces are the complete consumption story; correctness never gated.
tags: [boundary, D60]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read decisions.md D60 and CLAUDE.md Rule 3, then survey the repository's shipped surfaces.
  These are acceptance checks for the FINAL system.

  Verify ALL of the following:
  1. No web UI ships in this repository (no frontend app, no server-rendered dashboards); the
     consumption surfaces are API, CLI, MCP server, and mounted filesystems.
  2. No multi-tenant machinery exists: no orgs/users/roles tables, no SSO/SAML, no billing —
     one deployment is one trust domain.
  3. No correctness-determining mechanism (extraction, resolution, supersession, grounding,
     evals, budgets, DLQ, deletion) is stubbed out, feature-flagged off, or delegated to an
     external/commercial service — everything the design calls binding is implemented here.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
