schema_version: 1
id: code_config_via_pydantic_settings
type: harness_judge
description: All configuration enters through pydantic-settings; secrets are SecretStr/SecretBytes unwrapped only at point of use; no ad-hoc environment access.
tags: [code, requirements]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding convention.
  Read requirements_v3.md §Code, then inspect the settings module(s) and grep the source for
  environment access under src/. These are acceptance checks for the FINAL system: if the
  subsystem is absent or partial, score 0.

  Verify ALL of the following:
  1. Environment variables are read exclusively via pydantic-settings BaseSettings classes —
     no os.environ / os.getenv anywhere in src/ (the ruff TID251 ban must still be configured
     in pyproject.toml), and no evasions (subprocess env tricks, importing environ under an
     alias, reading /proc/self/environ).
  2. Every secret-bearing setting (DB URLs with passwords, API keys, tokens) is typed
     SecretStr/SecretBytes, and .get_secret_value() appears only at the call sites that hand
     the value to a client/driver — never stored unwrapped on another object, never logged.
  3. Settings objects are constructed at composition boundaries (entry points/workers), not
     scattered ad hoc through domain logic.

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
