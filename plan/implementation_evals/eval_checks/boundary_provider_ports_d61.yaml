schema_version: 1
id: boundary_provider_ports_d61
type: harness_judge
description: The deployment substrate is reached only through the provider ports, each with a self-host and a reference adapter; the engine itself is not abstracted; one deployment runs self-hosted.
tags: [boundary, D61]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read decisions.md D61 and requirements_v3.md §Fixed choices & the reference deployment, then
  inspect the adapter layer and self-host stack under src/ and the deploy profiles. These are
  acceptance checks for the FINAL system: if the subsystem is absent or partial, score 0.

  Verify ALL of the following:
  1. Ports exist as explicit interfaces for: object store, task queue/scheduler, mount
     publication, K git remote, model/embedding providers, telemetry export, and the auth
     perimeter — and substrate access goes through them (no direct GCS/Cloud Tasks calls
     scattered in domain code).
  2. Each port has both adapters: self-host (S3-compatible store, Postgres-backed queue, local
     directory mounts, generic git remote, BYO keys) and the reference set (GCS, Cloud Tasks,
     gcsfuse, hosted git).
  3. The engine is NOT abstracted: Postgres, LanceDB, LadybugDB, and the E/K/P data model are
     used directly — no "database-agnostic" indirection layers wrap them.
  4. A runnable self-host profile exists (docker-compose or equivalent) that brings up one
     complete deployment on the self-host adapters, with every correctness capability
     included.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
