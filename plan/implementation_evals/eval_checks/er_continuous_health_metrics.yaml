schema_version: 1
id: er_continuous_health_metrics
type: harness_judge
description: Continuous entity-resolution health monitoring exists — cluster-size distribution, singleton rate, unresolved-mention rate, merge-acceptance rate, and alias-growth anomaly tracking.
tags: [registries, D22, D21]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read plan/designs/registries_design.md §10 — the binding source — and decisions.md D22 for
  rationale and refinement history, then inspect the registry health monitoring under src/.
  These are acceptance checks for the FINAL system: if the subsystem is absent or partial,
  score 0.

  Verify ALL of the following:
  1. Continuous health metrics are computed over the live registry (not only golden-set
     evals): cluster-size distribution (black-hole watch), singleton rate, unresolved-mention
     rate, and merge-proposal acceptance rate.
  2. Alias-growth anomalies are tracked (the generic-identifier guard's signal: an alias
     suddenly linking many entities is surfaced for re-evaluation, D21).
  3. The metrics are recorded over time (queryable trend, not a log line) so resolver-version
     bumps are comparable.

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
