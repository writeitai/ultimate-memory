schema_version: 1
id: ret_envelope_contract
type: harness_judge
description: Every retrieval response is an envelope — declared grain, contradiction co-members never silently absent, per-source freshness stamps with believed_at horizons, explicit truncation, typed negatives.
tags: [retrieval, D49]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read decisions.md D49 and plan/designs/retrieval_design.md, then inspect the envelope types
  and their enforcement under src/. These are acceptance checks for the FINAL system: if the
  subsystem is absent or partial, score 0.

  Verify ALL of the following:
  1. Responses carry a declared grain (fact/evidence/compiled/composite) enforced at
     composition: current-fact answers assemble only from validity-filtered
     relations/observations; claims can never answer "is it true now"; composite answers are
     parts[], each strictly single-grain.
  2. Contradiction co-members are inline up to a guaranteed cap, beyond which the block always
     carries group_id + returned/total + a continuation — code cannot return a one-sided
     answer for a contradicted fact.
  3. Per-source freshness stamps ship in the envelope (PG live; P1 write lag; P2 snapshot
     timestamp + believed_at horizon with a typed boundary fallback; K compiled_at + staleness
     + open-flag count).
  4. Truncation is always marked with a continuation (no silent top-k); the applied temporal
     parameters and identity regime (current aliases vs identity_as_of) are echoed.
  5. A typed negative taxonomy exists: unknown_entity / known_empty / boundary — and there is
     NO denied kind; hard-forgotten content is indistinguishable from never-existed.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
