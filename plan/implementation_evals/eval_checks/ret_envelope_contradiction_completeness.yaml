schema_version: 1
id: ret_envelope_contradiction_completeness
type: harness_judge
description: Contradiction co-members are never silently absent — inline up to a cap and plan/designs/retrieval_design.md, then group_id + returned/total + continuation; one-sided answers are a contract violation.
tags: [retrieval, D49]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read decisions.md D49, then inspect the envelope contradiction handling under src/. These
  are acceptance checks for the FINAL system: if the subsystem is absent or partial, score 0.

  Verify ALL of the following:
  1. When a returned fact belongs to a contradiction group, co-members ship inline up to a
     guaranteed cap; beyond the cap the block always carries group_id + returned/total counts
     + a continuation handle.
  2. The code path makes a one-sided answer impossible for contradicted facts (a contract
     test demonstrates it) — never a ranking choice that happens to drop the other side.

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
