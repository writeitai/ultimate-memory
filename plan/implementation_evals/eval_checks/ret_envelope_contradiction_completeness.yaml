instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read decisions.md D49, then inspect the envelope contradiction handling under src/. These
  are acceptance checks for the FINAL system: if the subsystem is absent or partial, score 0.

  Verify ALL of the following:
  1. When a returned fact belongs to a contradiction group, co-members ship inline up to a
     guaranteed cap; beyond the cap the block always carries group_id + returned/total counts
     + a continuation handle.
  2. The code path makes a one-sided answer impossible for contradicted facts (a contract
     test demonstrates it) — never a ranking choice that happens to drop the other side.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
