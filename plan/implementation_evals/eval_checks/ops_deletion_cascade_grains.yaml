schema_version: 1
id: ops_deletion_cascade_grains
type: harness_judge
description: Deletion has grains; normal delete retains audit history, while D74 hard-forget scrubs every active store and survives independent restore.
tags: [ops, D55, D46, D54, D74, requirements]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read plan/designs/evidence_lifecycle_design.md §8 and
  plan/designs/postgres_schema_design.md §13 plus plan/designs/hard_forget_design.md — the
  binding sources — and decisions.md D55/D54/D46/D74 for rationale and refinement history,
  then inspect the deletion workers and purge adapters under src/. These are acceptance checks
  for the FINAL system: if the subsystem is absent or partial, score 0.

  Verify ALL of the following:
  1. Three grains exist: delete a version (tombstones ONLY that version; currency of its
     claims ends; the lineage continues), delete a lineage (tombstones the lineage and every
     version; the full cascade), and hard-forget (indistinguishable-from-never-existed
     semantics).
  2. Normal deletion at either grain purges the affected raw/artifact bytes, ends testimony
     currency for affected claims, recomputes counts, and closes solely-supported facts per
     shape (states: valid_until cap; measurements: invalidated_at) — recorded and reversible,
     never silent. Chunks, claims, evidence links, relations, and entities are RETAINED as
     audit history on a normal delete (claims are NOT deleted; evidence rows remain
     historical links).
  3. D74 hard-forget is a separate, lineage-scoped, append-first grain. Its portable
     content-free manifest is durable outside the ordinary restore set; a preparing/accepted
     operation fails closed for public and ordinary work without blocking its own coordinator;
     source/content guards prevent re-ingest; and PostgreSQL scrubs every classified
     source-bearing payload while independently supported facts survive.
  4. Normal deletion converges through current projection rebuilds and reaches K mechanically:
     compiled pages recompile and authored pages get a review flag. Hard-forget additionally
     purges exact P1 rows, old durable P2/P3 snapshots and local serving copies, raw/artifact/
     transcript objects, and affected K history after authored/curation owner-redaction
     preflight. Current recompilation or pointer movement alone is insufficient.
  5. A file observed deleted at its source is treated as lineage deletion, stamped with the
     observing sync cycle.
  6. Before every serving readiness, EVERY portable manifest is re-honored even when the local
     PostgreSQL row is complete. Deterministic tests independently restore object storage, P1,
     P2/P3 serving copies, and K after completion and prove each is purged again without hosted
     LLM/network calls. Provider backup schedules/expiry remain outside the OSS library.

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
