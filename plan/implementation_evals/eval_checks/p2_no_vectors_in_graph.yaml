schema_version: 1
id: p2_no_vectors_in_graph
type: harness_judge
description: The graph holds no embeddings and no FTS — vectors live in Lance; relation fact-labels are embedded in a Lance table with scalar columns.
tags: [p2, p1, D8]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read decisions.md D8, then inspect the P2 snapshot contents and the Lance table definitions
  under src/. These are acceptance checks for the FINAL system: if the subsystem is absent or
  partial, score 0.

  Verify ALL of the following:
  1. No vector index, no embedding column, and no FTS index exists in the LadybugDB snapshot.
  2. Each relation has a canonical fact label embedded in a Lance relations table keyed by
     relation_id, with scalar columns (subject_id, predicate, object_id, validity window,
     evidence_count) for filtered hybrid search.
  3. The retrieval flow is Lance-entry -> ID-keyed expansion in the graph (top-k relation_ids
     then BFS/paths), not in-graph semantic search.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
