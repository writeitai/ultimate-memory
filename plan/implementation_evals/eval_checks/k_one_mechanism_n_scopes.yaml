schema_version: 1
id: k_one_mechanism_n_scopes
type: harness_judge
description: One compile mechanism, N scopes — K1 plus K2 purpose scopes; principles are authored K2 content; the framework contract itself is not configurable.
tags: [k, D47, D73]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read plan/designs/k_layers_design.md §2/§7/§8 — the binding source — and decisions.md D47/D73
  for rationale and refinement history, then inspect the scope/tier configuration under
  src/. These are acceptance checks for the FINAL system: if the subsystem is absent or
  partial, score 0.

  Verify ALL of the following:
  1. There is exactly ONE compile pipeline; K1 and K2 are scope configuration (git subtree +
     registry rows + rules), not separate machinery or code paths. There is no built-in K3
     configuration or K3-specific behavior; a legacy schema/model enum label may remain only
     if it is inert.
  2. Each scope has a shared model page that is a declared input of every WRITER invocation
     in the scope (authored pages have no compile inputs; fact-sheet-only pages skip the
     writer — the requirement binds writer runs, not literally every page).
  3. Personal or organizational principles and stances are authored K2 pages: compiled pages
     may supply cited support or inert suggestions, but no automatic path promotes, rewrites,
     or assigns a numeric stance to a principle. Authored citations/watches route changed
     ground to review flags or dispatch.
  4. A deployment can reshape/rename/drop/invent scopes via configuration — but the
     framework contract is NOT configurable: page kinds + ownership, binding citations, the
     single automated committer, and trigger-surface acyclicity are enforced regardless of
     configuration.

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
