schema_version: 1
id: k_one_mechanism_n_scopes
type: harness_judge
description: One compile mechanism, N scopes — tiers are configuration; K3 is the stricter-config belief tier; the framework contract itself is not configurable.
tags: [k, D47, D54]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read plan/designs/k_layers_design.md §2 — the binding source — and decisions.md D47 for rationale and
  refinement history, then inspect the scope/tier
  configuration under src/. These are acceptance checks for the FINAL system: if the subsystem
  is absent or partial, score 0.

  Verify ALL of the following:
  1. There is exactly ONE compile pipeline; K1/K2/K3 exist as configuration (scopes = git
     subtree + registry rows + rules), not as separate machinery or code paths.
  2. Each scope has a shared model page that is a declared compile input of every page in the
     scope.
  3. The belief tier (K3) is stricter configuration: rules select only settled evidence
     (evidence_count >= N, no live contradiction_group, D54-flagged facts excluded), updates
     are evidence-gated (never timer-driven), and every belief cites supporting AND
     contradicting evidence.
  4. A deployment can reshape/rename/drop/invent scopes and tiers via configuration — but the
     framework contract is NOT configurable: page kinds + ownership, binding citations, the
     single automated committer, and trigger-surface acyclicity are enforced regardless of
     configuration.

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
