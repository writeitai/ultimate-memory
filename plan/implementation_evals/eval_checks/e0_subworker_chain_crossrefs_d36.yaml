schema_version: 1
id: e0_subworker_chain_crossrefs_d36
type: harness_judge
description: E0 is one product layer implemented as separately idempotent, separately observable sub-workers (ingest, convert, structure, crossref) with per-sub-worker version boundaries.
tags: [e0, D36]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read plan/designs/e0_files_design.md §1 — the binding source — and decisions.md D36 for
  rationale and refinement history, then inspect the E0 workers under src/. These are
  acceptance checks for the FINAL system: if the subsystem is absent or partial, score 0.

  Verify ALL of the following:
  1. E0 runs as a chain of distinct sub-workers — ingest, convert, structure, crossref — each
     separately idempotent (keyed on content identity + its OWN version) and separately
     observable (own processing state / status).
  2. A version bump of one sub-worker re-runs exactly that sub-worker and its downstream
     dependents — never unaffected upstream or sibling work (an early-stage bump legitimately
     cascades downstream; a late-stage bump must not re-run the stages before it).
  3. Crossref extraction records citations/document links as E0 metadata; structuring is not
     promoted to a top-level E layer (E1–E3 keep their meanings).

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
