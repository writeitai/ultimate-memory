schema_version: 1
id: e3_relations_evidence_collapse
type: harness_judge
description: Claims and relations are distinct, joined many-to-many with stance; the same fact with compatible validity collapses into one relation with evidence rows — while re-occurring facts in non-overlapping windows correctly get new rows.
tags: [e3, D2]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read plan/designs/postgres_schema_design.md §9 and
  plan/designs/e2_e3_claims_relations_design.md §5 — the binding sources — and decisions.md
  D2 (with plan/analysis/concepts.md as the worked explainer) for rationale and refinement
  history, then inspect the relations and relation_evidence schema and the E3 normalization
  under src/. These are acceptance checks for the FINAL system: if the subsystem is absent
  or partial, score 0.

  Verify ALL of the following:
  1. Relations are (subject_entity, predicate, object_entity) rows whose identity is the fact
     PLUS its validity interval; claims join via relation_evidence(relation_id, claim_id,
     stance supports|contradicts) — never claim_id stamped on graph edges, never 1:1
     claim=relation assumptions.
  2. A claim can yield 0..n relations; the same fact asserted again WITH compatible/overlapping
     validity links evidence to the EXISTING relation rather than inserting a duplicate — while
     a re-occurring fact in a non-overlapping window (Alice worked at Acme twice) correctly
     gets a NEW relation row (the schema's EXCLUDE permits exactly this).
  3. Duplicate evidence is idempotent (evidence-once per claim/fact pair).

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
