schema_version: 1
id: e2_selection_recall_envelope
type: harness_judge
description: Selection is recall-conservative — KEEP bias, never-drop classes, kept_flagged outcome, per-fact canary CI.
tags: [e2, D35, D22]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read plan/designs/e2_e3_claims_relations_design.md §3.4 — the binding source — and decisions.md D35 for rationale and
  refinement history, then inspect the Selection prompt/rubric, outcome enum, and eval
  harness under src/. These are acceptance checks for the FINAL system: if the subsystem is
  absent or partial, score 0.

  Verify ALL of the following:
  1. The Selection rubric instructs conservative KEEP when unsure, and mixed sentences are
     REWRITTEN to their verifiable span rather than dropped.
  2. Never-drop lexical classes are protected regardless of phrasing: quantities, dates,
     named-entity+predicate statements, change-of-state language.
  3. A low-confidence kept_flagged outcome exists (mark-for-review, not delete) — Selection
     never hard-deletes a borderline candidate silently.
  4. The eval harness plants rare-fact canaries and fails CI if Selection drops one; drop-rate
     tuning is per-fact, not corpus-average.

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
