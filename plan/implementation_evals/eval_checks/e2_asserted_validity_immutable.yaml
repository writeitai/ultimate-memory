schema_version: 1
id: e2_asserted_validity_immutable
type: harness_judge
description: Claims carry an immutable source-asserted validity interval (from/until/precision/kind), grounded by window-membership, never revisable, never a belief authority.
tags: [e2, D41, D32]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read decisions.md D41, then inspect the claim schema and the temporal extraction under src/.
  These are acceptance checks for the FINAL system: if the subsystem is absent or partial,
  score 0.

  Verify ALL of the following:
  1. Claims carry claim_valid_from/claim_valid_until + a precision + a kind
     (proposition-validity vs event-time vs measurement-period), emitted in the same E2 call.
  2. The interval is grounded: the date substring must verbatim-exist in the bundle
     (window-membership, D32) — ungrounded dates are rejected.
  3. The columns are immutable: no UPDATE path, no invalidated_at/status/superseded_by on them;
     a contradicting source yields a NEW claim with its own interval.
  4. The relation/observation adjudicator may consult claim_valid_* as evidence input with a
     monotonicity guard (a late retrospective cannot move an adjudicated window), and nothing
     reads claim validity back as current belief.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
