schema_version: 1
id: media_converter_routes_bound
type: harness_judge
description: The three media converter routes exist (diarized ASR, video ASR + adaptive keyframes, image discriminator to OCR or VLM description), the canonical-text rule holds (document.md is the only extractable text; sidecars are interchange), and the generalized converter contract is implemented.
tags: [e0, media, D65, D38]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read plan/designs/media_design.md §1–§3 and plan/designs/e0_files_design.md §2–§3 — the
  binding sources — and decisions.md D65 (with D38/D57 and their refinement annotations) for
  rationale, then locate the conversion module and its router under src/. These are acceptance
  checks for the FINAL system: if the subsystem is absent or partial, score 0.

  Verify ALL of the following:
  1. The converter router has three media routes, each a versioned converter
     (converter_name/converter_version): audio/* → diarized ASR producing a transcript as
     document.md with one block-eligible unit per speaker turn; video/* → ASR of the audio
     track + adaptive keyframes (per shot/coverage policy, not per frame) landing in media/
     with locators + optional VLM shot notes; standalone images → a document-vs-picture
     discriminator routing to OCR (image that is a document) or VLM description + OCR of
     visible text (image that is a picture). MIME alone is never the picture/document decider.
  2. Speaker resolution is conservative by implementation: a speaker is resolved to a person
     entity only on positive evidence (self-introduction, bundle participant metadata,
     registry match); otherwise a stable anonymous label (e.g. "Speaker 2") is kept — the
     code never guess-assigns an identity. (Rationale: wrong attribution corrupts attributed
     stance, D59; missing attribution only loses claims.)
  3. The canonical-text rule: all text eligible for extraction, search, and grounding lives in
     document.md. A transcript is written as the document.md body; any .vtt/JSON transcript in
     media/ is an interchange copy (provenance-linked) and nothing in the blockizer, E2,
     P1 indexing, or grounding reads text from sidecars.
  4. The generalized contract is implemented for every route: convert(bytes, mime, hints) →
     { document.md, source_map, derived_assets[], manifest }, where the manifest records the
     route taken, models + versions used, and each document.md section's derivation labels;
     media routes emit sectioned Markdown whose sections separate derivation kinds
     structurally (e.g. Transcript / Visual description / Visible text / Shot notes).
  5. Whole-file media originals are never copied into media/ or the artifacts browse tree —
     they serve from the raw store/mount via the explicit pointer (D51); media/ holds only
     derived assets (keyframes, crops, thumbnails, interchange transcripts).

  Source precedence: the design docs under plan/designs/ are the binding statement of the
  current system; the decision log is its indexed record — read cited decisions together
  with their refinement/withdrawal annotations. If sources appear to disagree, treat the
  design docs (including postgres_schema_design.md) as controlling, and note the
  discrepancy in your reason rather than failing an implementation that follows the
  current design.

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
