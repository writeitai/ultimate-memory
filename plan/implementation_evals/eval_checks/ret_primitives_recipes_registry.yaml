schema_version: 1
id: ret_primitives_recipes_registry
type: harness_judge
description: The query machine is typed zero-LLM primitives + recipes as registry rows (output_grain/answer_intent enforced); recipes add convenience, never capability; no NL->plan compiler.
tags: [retrieval, D50, D9]
instructions: |
  You are judging whether this repository's IMPLEMENTATION honors a binding design invariant.
  Read decisions.md D50 and plan/designs/retrieval_design.md, then inspect the primitives and
  recipe registry under src/. These are acceptance checks for the FINAL system: if the
  subsystem is absent or partial, score 0.

  Verify ALL of the following:
  1. Primitives are typed, orthogonal, side-effect-free, zero-LLM operations (resolve with
     non-LLM tiers only — no T4 on the hot path, ranked candidates never a silent guess;
     lookup; search; graph; fuse as an explicit RRF operator; rerank; hydrate; transcript;
     delta; pages_about; enumerated aggregate; streaming scan on a separate resource pool).
  2. Recipes are REGISTRY ROWS (name, description, typed parameters, typed primitive chain,
     output_grain and answer_intent enums, version) — not code; a linter/validation enforces
     grain semantics mechanically on the enums at registration; MCP tools render from the
     registry.
  3. Each recipe replays as its primitive chain with an empty diff (testable: recipes add
     convenience, never capability).
  4. There is no natural-language-to-query-plan compiler anywhere on the query path, and no
     LLM call in the core search path (D9).

  Score 1 only if EVERY condition demonstrably holds — cite file paths in your reason.
  Otherwise score 0.
