name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      UGM_DATABASE_URL: postgresql+psycopg://ugm:ugm_test@localhost:5432/ugm_test
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    services:
      postgres:
        image: ghcr.io/dbsystel/postgresql-partman@sha256:bf9d2331aaeb3e33a4e6e73b4c024ca618d4d1ea050bbab978125ff63b83385a
        env:
          POSTGRES_USER: ugm
          POSTGRES_PASSWORD: ugm_test
          POSTGRES_DB: ugm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ugm -d ugm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (locked)
        run: uv sync --locked --python ${{ matrix.python-version }}

      - name: Architecture dependency check
        run: uv run lint-imports

      - name: Ruff lint
        run: uv run ruff check src/

      - name: Ruff format check
        run: uv run ruff format --check src/

      - name: Pyright type check
        run: uv run pyright src/ --pythonversion ${{ matrix.python-version }}

      - name: Real PostgreSQL Alembic lifecycle
        run: uv run pytest src/tests/spine/test_migrations.py -v --tb=short

      - name: Tests (with coverage)
        run: uv run pytest src/tests -v --tb=short --cov --cov-report=term
        env:
          COVERAGE_FILE: .coverage.${{ matrix.python-version }}

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: .coverage.${{ matrix.python-version }}
          include-hidden-files: true

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    needs: checks
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Coverage comment + badge
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MERGE_COVERAGE_FILES: true
