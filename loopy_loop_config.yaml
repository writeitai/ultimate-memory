goal_file: loopy_loop_goal.txt
# Double loop from day one (loopy-loop decision D6): the PM parent decomposes
# the roadmap into work packages; each WP runs as a child session on the
# inner_outer_eval set.
workflow_set: pm_planner_dispatcher
completion_criteria:
  - Every phase file from phase 0 through phase 8 shows all work packages done and records verifiable exit-criteria evidence linked from the parent finished ledger.
  - Phase 8 benchmark exit criteria pass and their results are recorded.
  - A final-closeout child and the parent program eval each pass a snapshot equal to the complete current curated inventory under plan/implementation_evals/eval_checks/.
  - Required CI is green on main, and every repository change created by this loopy program is represented by a merged PR and updated main; historical branches outside the program are out of scope.
  - The parent project_state/finished.md links enough phase, eval, git, PR, CI, and merge evidence to verify completion without re-deriving it.
stop_criteria:
  - Stop as goal_met only through the parent eval runner's passing same-session evidence-bound receipt and identity-bound control v2.
  - >-
    Stop as unresolvable_error only under loopy-loop's D5 autonomy policy: a
    genuinely terminal blocker remains after autonomous re-scoping, retry,
    rerouting, and all permitted alternatives are exhausted.
# Applies to the PM parent AND to every child session (children read this same
# config). High ceiling as a runaway backstop, not a target; the loop stops on
# goal_met.
max_turns: 1000
goal_check_consecutive_failures_cap: 5
# Per-workflow circuit breaker (coordinator-side): consecutive failed
# iterations of one workflow stop that session with
# stop_reason=workflow_failure_cap instead of burning max_turns. A capped
# CHILD is evidence the planner reviews (rescope / re-dispatch / blocked),
# not the end of the run.
workflow_consecutive_failures_cap: 5
team_harness_provider: "codex"
# GPT-5.6 family (GA 2026-07): sol = flagship, terra = workhorse, luna = fast/cheap.
# Coordinator on the flagship — it owns loop judgment and synthesis.
team_harness_model: "gpt-5.6-sol"
team_harness_agents:
  - "codex"
  - "claude"
  - "antigravity"
team_harness_agent_models:
  codex: "gpt-5.6-sol"
  claude: "claude-opus-4-8"
  # agy takes its models list's display names verbatim (`agy models`).
  # Requires team-harness >= 0.3.1 (older versions silently ignore the pin).
  antigravity: "Gemini 3.5 Flash (High)"
team_harness_agent_reasoning_efforts:
  codex: "xhigh"
  claude: "xhigh"
# Optional coordinator retry controls. Omit to use team-harness defaults.
# team_harness_max_retries: 8
# team_harness_retry_base_delay_s: 2.0
# team_harness_retry_max_delay_s: 60.0
# Used only if team_harness_provider is switched to openai_compat
# (OpenRouter id for the same model: openai/gpt-5.6-sol).
team_harness_api_base: "https://openrouter.ai/api/v1"
team_harness_api_key_env: "OPENROUTER_API_KEY"
# Cost budget intentionally NOT set: the codex provider bills through the
# Codex subscription, not per token, so model_prices would fabricate a number.
# Token usage is still recorded per session (loopy status shows it). If the
# provider is switched to openai_compat, set both of these:
# model_prices:
#   prompt_usd_per_1m: <price>
#   completion_usd_per_1m: <price>
# max_cost_usd: <budget>
#
# NOTE: this extension reaches EVERY harness run in this repo — the PM
# planner/dispatcher AND every inner_outer_eval child workflow — at system
# prompt level. Keep it strictly workflow-set-neutral: only repo-wide facts
# and conventions belong here. Role-specific process (who owns finished.md,
# PR policy, review flow) lives in the workflow prompts themselves.
team_harness_system_prompt_extension: |
  This repository's rules (binding for every workflow):
  - Read the per-attempt Assignment envelope first. Its layer identity, scoped
    goal, role, ownership, and absolute paths are authoritative. Never infer a
    session path from cwd or substitute a parent/root goal for this layer's goal.
  - Engine state and session topology are coordinator-owned. Write only the
    semantic state, evidence, requests, receipts, and control artifacts assigned
    to the current role; use the assignment's absolute output paths.
  - Directly spawned agents are temporary delegates inside the current harness
    attempt. Choose them dynamically for the situation, give each a focused
    task and absolute assignment/output paths, and record meaningful
    `delegated_role`, `delegated_task_id`, `expected_outputs`, and
    `state_responsibility` metadata. Integrate their evidence; delegates do not
    own loop-layer acceptance, eval verdicts, or control.
  - Preserve unrelated pre-existing worktree changes. Commit only files owned
    by the selected work item unless that item explicitly incorporates them.
    After a merged repository change, normalize the shared checkout to updated
    `main` with a fast-forward-only pull and record branch/HEAD evidence; never
    discard unrelated changes to force that transition.
  - plan/plans/roadmap.md is the sequencing authority. Work is executed as the
    phase files' work packages (WP-N.x); a WP is executed after reading the
    documents in its Reads column plus plan/analysis/concepts.md §0. Designs
    are binding. If a WP appears to require deviating from a design, that is a
    DESIGN CHANGE: stop implementation and produce the source-linked conflict
    report required by the child goal so PM can reroute an authoritative
    amendment first. This is repairable program work, not a terminal blocker;
    never implement around it and merely record a note.
  - WP status columns in the phase files
    (planned | in-progress | done | blocked(<gate>)) are maintained ONLY by
    the implementation session that owns the dispatched WP, committed together
    with the work they describe. PM (planner/dispatcher) and eval workflows
    never edit plan/ files.
  - Respect the roadmap's gate register: never start a phase whose entry gate
    is open; record blockers instead of working around them.
  - Code conventions: typed Python (Pydantic at boundaries), pyright + ruff +
    pytest green before any merge; all configuration enters through
    pydantic-settings BaseSettings, and secret-bearing settings use
    SecretStr/SecretBytes (os.environ is banned by lint); tool-config
    relaxations require recorded receipts.
  - implementation_core_values.md (repo root) is binding for all code: fully
    typed; no magic values outside pydantic-settings; simplicity first (no
    conditionals/feature flags unless absolutely needed); most important
    functions at the top of the file; tests verify behavior and contracts;
    exceptions are never buried or trimmed (propagate, or keep the failure
    VISIBLE: full traceback via logger.exception / print_exc, failure
    recorded, caller sees a failure — never a fabricated success value;
    contained continue-past-failure is fine, disappearing failures are not;
    chains preserved with raise-from; catch-to-log at explicit boundaries
    only; real exception objects reachable for Sentry-class capture behind
    the telemetry port); arguments passed by name; every function has a
    docstring. A PR violating a core value is not done, whatever it
    delivers.
  - Documentation ships with behavior (D66): a change that affects user-facing
    behavior updates its page under website/src/app/docs/**/page.mdx and keeps
    /docs/project-status truthful IN THE SAME PR. The repo has no docs/ tree;
    website/ is the product documentation.
  - Before touching P1 (LanceDB) or P2 (LadybugDB) code, read the engine
    rulebooks: plan/analysis/lance_indexing_maintenance.md and
    plan/analysis/ladybug_query_semantics.md. They are binding query/indexing
    rules, not background.
  - Any edit to plan/ documents follows CLAUDE.md Rule 1 (self-contained,
    explain-don't-name) and Rule 2 (full scope, no phasing language in
    designs).
  - A terminal blocker is the loopy-loop D5 autonomy policy's last resort. Only after autonomous repair,
    re-scoping, retry, and alternate routes are exhausted may the accountable
    role atomically publish identity-bound control v2 with the exact
    session/workflow/attempt producer, attempted routes, evidence, and reason.
